<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bucks Criminal Cases Dashboard</title>

  <link rel="preconnect" href="https://api.fontshare.com" />
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="./style.css" />
  <script defer src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script defer src="./app.js"></script>
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>

  <header class="site-header">
    <div class="header-inner">
      <div>
        <p class="eyebrow">UJS / Bucks County</p>
        <h1>Bucks Criminal Cases Dashboard</h1>
        <p class="subhead">
          A table-first view of recent criminal case filings and scheduled events.
        </p>
      </div>

      <button class="theme-toggle" type="button" data-theme-toggle aria-label="Switch color theme">
        <span aria-hidden="true">◐</span>
      </button>
    </div>
  </header>

  <main id="main" class="page-shell">
    <section class="stats-grid" aria-label="Summary statistics">
      <article class="stat-card">
        <p class="stat-label">Rows shown</p>
        <p class="stat-value" id="rowsShown">—</p>
      </article>

      <article class="stat-card">
        <p class="stat-label">Unique dockets</p>
        <p class="stat-value" id="uniqueDockets">—</p>
      </article>

      <article class="stat-card">
        <p class="stat-label">Latest filing date</p>
        <p class="stat-value" id="latestFilingDate">—</p>
      </article>

      <article class="stat-card">
        <p class="stat-label">Last updated</p>
        <p class="stat-value stat-value-sm" id="lastUpdated">Loading…</p>
      </article>
    </section>

    <section class="controls-panel" aria-label="Filters and search">
      <div class="control">
        <label for="searchInput">Search</label>
        <input
          id="searchInput"
          type="search"
          placeholder="Search caption, docket, event type, location…"
          autocomplete="off"
        />
      </div>

      <div class="control">
        <label for="eventTypeFilter">Event type</label>
        <select id="eventTypeFilter">
          <option value="">All event types</option>
        </select>
      </div>

      <div class="control">
        <label for="filingDateFilter">Filing date</label>
        <select id="filingDateFilter">
          <option value="">All filing dates</option>
        </select>
      </div>

      <div class="control control-button">
        <button id="resetFilters" type="button">Reset filters</button>
      </div>
    </section>

    <section class="table-panel" aria-label="Cases table">
      <div class="table-meta">
        <p id="tableStatus">Loading data…</p>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th><button type="button" class="sort-btn" data-sort="FilingDate">Filing date</button></th>
              <th><button type="button" class="sort-btn" data-sort="EventDate">Event date</button></th>
              <th><button type="button" class="sort-btn" data-sort="DocketNumber">Docket</button></th>
              <th><button type="button" class="sort-btn" data-sort="CaseCaption">Case caption</button></th>
              <th><button type="button" class="sort-btn" data-sort="EventType">Event type</button></th>
              <th><button type="button" class="sort-btn" data-sort="EventLocation">Location</button></th>
              <th>Links</th>
            </tr>
          </thead>
          <tbody id="tableBody">
            <tr>
              <td colspan="7" class="loading-cell">Loading…</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>
</body>
</html>
